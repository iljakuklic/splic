[workspace]
members = ["compiler"]
resolver = "3"

[workspace.dependencies]
anyhow = { version = "1", default-features = false }
bumpalo = { version = "3", default-features = false }
bolero = "0.13"

[profile.fuzz]
inherits = "dev"
opt-level = 3
incremental = false
codegen-units = 1

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
